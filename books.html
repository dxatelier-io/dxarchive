<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX Library | Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f4efe7;
  font-family:'Cormorant Garamond', serif;
}

/* Shelf */
.shelf{
  padding:120px 10%;
  display:flex;
  gap:20px;
  align-items:flex-end;
  border-bottom:8px solid #c2a07a;
}

/* Book spine */
.book{
  width:60px;
  height:260px;
  background:#9c7c5b;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.4s;
}

.book:nth-child(2){background:#6d4c41;}
.book:nth-child(3){background:#3e2723;}

.book:hover{
  transform:translateY(-10px);
}

/* Fade */
body{
  animation:fadeIn 0.6s ease;
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="shelf">
  <div class="book" onclick="location.href='autumn.html'">
    Autumn in April
  </div>
  <div class="book" onclick="location.href='tenofapril.html'">
    Ten of April
  </div>
  <div class="book" onclick="location.href='worthy.html'">
    Am I Not Worthy?
  </div>
</div>

</body>
</html>
