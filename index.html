<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX Archive | Literary House</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f4efe7;
  --text:#1b1b1b;
  --accent:#9c7c5b;
  --line:#e5ded4;
}

body.dark{
  --bg:#0f0f0f;
  --text:#f1f1f1;
  --line:#1f1f1f;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s ease;
  overflow-x:hidden;
  cursor:url('https://cur.cursors-4u.net/cursors/cur-9/cur817.cur'), auto;
}

/* Page fade transition */
body.fade-out{
  opacity:0;
  transition:opacity 0.5s ease;
}

/* Header */
header{
  padding:25px 10%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
  position:fixed;
  width:100%;
  background:var(--bg);
  z-index:1000;
}

.logo{
  font-family:'Cormorant Garamond', serif;
  font-size:26px;
  letter-spacing:2px;
}

/* Hamburger */
.menu-toggle{
  display:none;
  font-size:22px;
  cursor:pointer;
}

nav{
  display:flex;
  gap:30px;
}

nav a{
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  opacity:0.7;
  transition:0.3s;
}

nav a:hover{
  opacity:1;
  color:var(--accent);
}

/* Mobile menu */
@media(max-width:768px){
  nav{
    position:fixed;
    top:0;
    right:-100%;
    height:100vh;
    width:70%;
    background:var(--bg);
    flex-direction:column;
    padding:100px 40px;
    transition:0.4s;
  }
  nav.active{
    right:0;
  }
  .menu-toggle{
    display:block;
  }
}

/* Parallax hero */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 10%;
  background:url('https://images.unsplash.com/photo-1519681393784-d120267933ba') center/cover fixed;
  color:white;
  position:relative;
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.hero-content{
  position:relative;
  max-width:700px;
}

.hero h1{
  font-family:'Cormorant Garamond', serif;
  font-size:64px;
  margin-bottom:20px;
}

.hero button{
  margin-top:30px;
  padding:12px 28px;
  border:1px solid white;
  background:none;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  background:white;
  color:black;
}

/* Section */
.section{
  padding:120px 10%;
}

.section h2{
  font-family:'Cormorant Garamond', serif;
  font-size:40px;
  margin-bottom:60px;
}

/* Book opening animation */
.book-preview{
  width:200px;
  height:260px;
  background:#9c7c5b;
  position:relative;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform 1s;
}

.book-preview:hover{
  transform:rotateY(-30deg);
}

.book-preview::before{
  content:'DX Manuscript';
  position:absolute;
  color:white;
  font-family:'Cormorant Garamond', serif;
  padding:20px;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--bg);
  padding:40px;
  max-width:500px;
}

.modal button{
  margin-top:20px;
}

/* Footer */
footer{
  padding:60px;
  text-align:center;
  border-top:1px solid var(--line);
  font-size:13px;
}

/* Ambient audio hidden */
audio{
  display:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">DX Archive</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <nav id="nav">
    <a href="index.html">Home</a>
    <a href="books.html">Collection</a>
    <a href="#" onclick="toggleDark()">Dark Mode</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Where Words Are Given Room to Breathe</h1>
    <p>An independent literary archive.</p>
    <button onclick="goPage('books.html')">Enter Library</button>
  </div>
</section>

<section class="section">
  <h2>Preview Manuscript</h2>
  <div class="book-preview" onclick="openModal()"></div>
</section>

<footer>
  © 2026 DX Archive. All rights reserved.
</footer>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Chapter Preview</h3>
    <p>“Some stories do not end. They simply fade into quieter rooms.”</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- Ambient piano -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>
/* Page transition */
function goPage(url){
  document.body.classList.add("fade-out");
  setTimeout(()=>{window.location=url},500);
}

/* Dark mode save */
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

/* Mobile menu */
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}

/* Modal */
function openModal(){
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
